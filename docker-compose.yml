services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transactions
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transactions"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  api:
    build: ./backend
    # .env.example is the committed fallback; .env (gitignored) holds real secrets
    # like GEMINI_API_KEY and overrides it. Both optional so fresh clones still boot.
    env_file:
      - path: ./backend/.env.example
        required: false
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/transactions
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build: ./backend
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - path: ./backend/.env.example
        required: false
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/transactions
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  frontend:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  pgdata:
